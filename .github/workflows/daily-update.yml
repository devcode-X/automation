name: Daily Repository Update

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step by 23f2001432@ds.study.iitm.ac.in
        run: echo "Running automated update"

      - name: Make daily commit
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add daily-log.txt
          git commit -m "Automated daily update $(date)" || echo "No changes"
          git push

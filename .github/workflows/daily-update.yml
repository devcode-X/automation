name: Daily Repository Update

on:
  schedule:
    - cron: '30 18 * * *'  # Runs daily at 18:30 UTC (change if needed)
  workflow_dispatch:       # Allows manual trigger

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step by 23f2001432@ds.study.iitm.ac.in
        run: echo "Running automated update"

      - name: Make daily commit
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"
          git add daily-log.txt
          git commit -m "Automated daily update"
          git push
